<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter Defense</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Courier New', monospace;
            color: #fff;
        }
        
        #gameContainer {
            text-align: center;
        }
        
        #menuScreen, #gameOverScreen {
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 15px;
            border: 3px solid #00ff88;
            max-width: 500px;
        }
        
        h1 {
            color: #00ff88;
            font-size: 2.5em;
            margin: 0 0 20px 0;
            text-shadow: 0 0 10px #00ff88;
        }
        
        button {
            background: #00ff88;
            color: #1a1a2e;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #00cc6e;
            transform: scale(1.05);
            box-shadow: 0 0 20px #00ff88;
        }
        
        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        canvas {
            border: 3px solid #00ff88;
            border-radius: 10px;
            background: #0a0a1a;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }
        
        #hud {
            display: flex;
            justify-content: space-between;
            width: 600px;
            margin-bottom: 15px;
            font-size: 1.3em;
            font-weight: bold;
        }
        
        .hud-item {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid #00ff88;
        }
        
        #failedWord {
            color: #ff4444;
            font-size: 1.8em;
            letter-spacing: 8px;
        }
        
        .instructions {
            margin: 20px 0;
            line-height: 1.8;
            color: #aaa;
        }
        
        #finalStats {
            margin: 20px 0;
            font-size: 1.2em;
            line-height: 1.8;
        }
        
        .unlock {
            color: #ffd700;
            font-size: 1.1em;
            margin: 15px 0;
            text-shadow: 0 0 10px #ffd700;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="menuScreen">
            <h1>LETTER DEFENSE</h1>
            <div class="instructions">
                Move your mouse to aim<br>
                Click to shoot (or press SPACEBAR)<br>
                Destroy falling letters before they spell FAILED<br>
                Survive 60 seconds to win!
            </div>
            <button onclick="startGame('easy')">EASY</button>
            <button onclick="startGame('medium')">MEDIUM</button>
            <button onclick="startGame('hard')">HARD</button>
            <button id="impossibleBtn" onclick="startGame('impossible')" disabled>IMPOSSIBLE</button>
        </div>
        
        <div id="gameScreen" style="display: none;">
            <div id="hud">
                <div class="hud-item">Time: <span id="timer">60</span>s</div>
                <div class="hud-item">Word: <span id="failedWord">______</span></div>
                <div class="hud-item">Score: <span id="score">0</span></div>
            </div>
            <canvas id="gameCanvas" width="600" height="450"></canvas>
        </div>
        
        <div id="gameOverScreen" style="display: none;">
            <h1 id="resultTitle"></h1>
            <div id="finalStats"></div>
            <div id="unlockMessage" class="unlock"></div>
            <button onclick="showMenu()">MAIN MENU</button>
            <button onclick="restartGame()">PLAY AGAIN</button>
        </div>
    </div>
    <script src="mainGame.js"></script>
    </body>
</html>
